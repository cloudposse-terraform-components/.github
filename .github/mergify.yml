# These are YAML anchor definitions to avoid repetition and make the file more readable
shared:
  # Has changes to terraform code
  is_terraform: &is_terraform "files~=\\.tf$"

  # Has changes to tests
  is_tests: &is_tests "files~=test/.*$"

  # Has changes to go deps
  is_go_deps: &is_go_deps "files~=test/(go\\.mod|go\\.sum)$"

  # Has changes to components vendor
  is_components_vendor: &is_components_vendor "files~=(vendor\\.ya?ml|component\\.ya?ml)$"

  # Has changes to .github configuration files
  is_github_config: &is_github_config "files~=\\.github/.*$"

  # Has changes to component files
  is_component: &is_component "files~=src/.*$"

  # Has changes to tflint config
  is_lint_config: &is_lint_config "files~=\\.tflint\\.hcl$"

  # Has changes in readme MD
  is_readme_md: &is_readme_md
    or:
      - "files~=README\\.md$"
      - "files~=src/README\\.md$"

  # Automated pull requests from bot users
  is_a_bot: &is_a_bot
    or:
      - "author=dependabot[bot]"
      - "author=renovate[bot]"
      - "author=cloudposse-releaser[bot]"

  # Pull requests created or co-authored by GitHub Copilot
  is_copilot_author:
    or:
      - "author=github-copilot[bot]"
      - "author=Copilot"
      - "author~=(?i).*copilot.*"
      - "body~=(?i)Co-authored-by:.*copilot"

  # Not a bot user
  not_a_bot: &not_a_bot
    not: *is_a_bot

  # Contribution is from an internal contributor, part of the organization
  is_internal_contributor:
    and:
      - *not_a_bot
      - or:
          - "author=@engineering"
          - "author=@contributors"
          - "author=@admins"
          - "author=@bots"
          - "author=@approvers"
          - "author=@security"

  # Contribution is from an external contributor, not part of the organization
  is_external_contributor:
    and:
      - "-author=@engineering"
      - "-author=@contributors"
      - "-author=@admins"
      - "-author=@bots"
      - "-author=@approvers"
      - "-author=@security"
      - *not_a_bot

  # Default branches
  is_default_branch:
    or:
      - "base=main"
      - "base=master"

  # Release branches
  is_release_branch: &is_release_branch "base~=^release/v\\d{1,2}$"

  # Not a work in progress
  not_wip:
    and:
      - "-title~=^(wip|WIP)"
      - "-label~=(WIP|wip|do-not-merge|do not merge|triage|stale|feedback|help needed)"
      - '-draft'

  # Label indicates some action is needed
  needs_attention: &needs_attention "label~=(triage|stale|feedback|help needed)"

  # Do not merge this PR
  do_not_merge: &do_not_merge
    or:
      - "label~=(do-not-merge|do not merge)"
      - "title~=(do-not-merge|do not merge)"

  # Is a work in progress
  is_wip:
    or:
      - "title~=^(wip|WIP)"
      - "label~=(WIP|wip)"
      - *do_not_merge
      - *needs_attention
      - 'draft'

  # Not in conflict
  not_in_conflict:
    and:
      - "-conflict"
      - "-label~=(conflict)"

  # Properly titled and described
  pr_has_metadata:
    and:
      - "title~=(^[0-9A-Za-z]+)"
      - body~=[0-9A-Za-z]{3,}\\s+[0-9A-Za-z]{3,}\\s+[0-9A-Za-z]{3,}
      - -body~=(Describe high-level what changed)

  # Has reviews and no changes requested
  is_approved: &is_approved "branch-protection-review-decision=APPROVED"

  # Has not been approved
  not_approved:
    not: *is_approved

  # Checks are passing
  checks_are_passing:
    and:
      - "-check-pending~=Branch\\/.*$"
      - "-check-failure~=Branch\\/.*$"

  # Only for terraform files
  require_terraform_checks_are_passing:
    or:
      - "-files~=\\.tf$"
      - and:
          - "check-success=test/bats"
          - "check-success=test/terratest"
          - -status-failure~=^(terratest|terraform)$

  # CODEOWNERS check did not run or is not passing
  require_codeowners_checks_are_passing:
    or:
      - "-files=CODEOWNERS"
      - "check-success=validate-codeowners"

  # It's not closed or merged
  is_open:
    and:
      - -merged
      - -closed

  # Was recently updated one minute ago
  is_recent_commit: &is_recent_commit commits[*].date_committer > 1 minutes ago

  # README.md is updated together with README.yaml
  readme_updated:
    and:
      - "author=cloudposse-releaser[bot]"
      - *is_readme_md
      - or:
          - "#files=1"
          - "#files=2"
      - "title=Update README.md and docs"
      - "head=auto-update/readme"

  # Needs Cloud Posse review
  needs_cloudposse:
    or:
      - "files~=(mergify|settings|dependabot|renovate|CODEOWNERS|\\.github|Makefile|Dockerfile)"
      - "label~=(cloudposse)"

  # Has no changes
  has_no_changes: &has_no_changes "#files=0"

  # Needs re-run
  needs_rerun: &needs_rerun "label~=needs-re-run"

  all_commits_verified: &all_commits_verified "#commits-unverified=0"

# All the rules for the Pull Request
pull_request_rules:
  - name: "Auto approve auto updates PRs"
    conditions:
      - and:
          - -merged
          - -closed
      - or:
          - author=dependabot[bot]
          - author=renovate[bot]
          - author=cloudposse-releaser[bot]
      - and:
          - -conflict
          - -label~=(conflict)
      - and:
          - -title~=^(wip|WIP)
          - -label~=(WIP|wip|do-not-merge|do not merge|triage|stale|feedback|help needed)
          - -draft
      - and:
          - -check-pending~=Branch\/.*$
          - -check-failure~=Branch\/.*$
      - '#commits-unverified=0'
      - not: github-review-decision=APPROVED
      - or:
          - files~=test/(go\.mod|go\.sum)$
          - files~=\.tflint\.hcl$
          - files~=(vendor\.ya?ml|component\.ya?ml)$
          - files~=test/.*$
          - files~=src/.*$
      - not: files~=\.github/.*$
      - not:
          and:
            - author=cloudposse-releaser[bot]
            - or:
                - files~=README\.md$
                - files~=src/README\.md$
            - or:
                - '#files=1'
                - '#files=2'
            - title=Update README.md and docs
            - head=auto-update/readme
    actions:
      review:
        type: APPROVE
        bot_account: cloudpossebot

  - name: "Auto approve Readme PRs"
    conditions:
      - and:
          - -merged
          - -closed
      - and:
          - -conflict
          - -label~=(conflict)
      - and:
          - -title~=^(wip|WIP)
          - -label~=(WIP|wip|do-not-merge|do not merge|triage|stale|feedback|help needed)
          - -draft
      - and:
          - -check-pending~=Branch\/.*$
          - -check-failure~=Branch\/.*$
      - not: github-review-decision=APPROVED
      - and:
          - author=cloudposse-releaser[bot]
          - or:
              - files~=README\.md$
              - files~=src/README\.md$
          - or:
              - '#files=1'
              - '#files=2'
          - title=Update README.md and docs
          - head=auto-update/readme
    actions:
      review:
        type: APPROVE
        bot_account: cloudpossebot

  - name: "Auto merge Readme PRs"
    conditions:
      - and:
          - -merged
          - -closed
      - and:
          - -conflict
          - -label~=(conflict)
      - and:
          - -title~=^(wip|WIP)
          - -label~=(WIP|wip|do-not-merge|do not merge|triage|stale|feedback|help needed)
          - -draft
      - and:
          - -check-pending~=Branch\/.*$
          - -check-failure~=Branch\/.*$
      - github-review-decision=APPROVED
      - and:
          - author=cloudposse-releaser[bot]
          - or:
              - files~=README\.md$
              - files~=src/README\.md$
          - or:
              - '#files=1'
              - '#files=2'
          - title=Update README.md and docs
          - head=auto-update/readme
    actions:
      merge:
        method: squash

  - name: "Add approved PR to merge queue"
    conditions:
      - or:
          - author=dependabot[bot]
          - author=renovate[bot]
          - author=cloudposse-releaser[bot]
      - and:
          - -merged
          - -closed
      - and:
          - -conflict
          - -label~=(conflict)
      - and:
          - -title~=^(wip|WIP)
          - -label~=(WIP|wip|do-not-merge|do not merge|triage|stale|feedback|help needed)
          - -draft
      - github-review-decision=APPROVED
      - and:
          - -check-pending~=Branch\/.*$
          - -check-failure~=Branch\/.*$
      - not:
          and:
            - author=cloudposse-releaser[bot]
            - or:
                - files~=README\.md$
                - files~=src/README\.md$
            - or:
                - '#files=1'
                - '#files=2'
            - title=Update README.md and docs
            - head=auto-update/readme
    actions:
      github_actions:
        workflow:
          dispatch:
            - workflow: automerge.yml
              inputs:
                pr_number: "{{ number }}"

  - name: "Request approval for PRs"
    conditions:
      - and:
          - -merged
          - -closed
      - or:
          - and:
              - -author=@engineering
              - -author=@contributors
              - -author=@admins
              - -author=@bots
              - -author=@approvers
              - -author=@security
              - not:
                  or:
                    - author=dependabot[bot]
                    - author=renovate[bot]
                    - author=cloudposse-releaser[bot]
          - and:
              - and:
                  - not:
                      or:
                        - author=dependabot[bot]
                        - author=renovate[bot]
                        - author=cloudposse-releaser[bot]
                  - or:
                      - author=@engineering
                      - author=@contributors
                      - author=@admins
                      - author=@bots
                      - author=@approvers
                      - author=@security
              - and:
                  - -title~=^(wip|WIP)
                  - -label~=(WIP|wip|do-not-merge|do not merge|triage|stale|feedback|help needed)
                  - -draft
              - and:
                  - -conflict
                  - -label~=(conflict)
              - and:
                  - -check-pending~=Branch\/.*$
                  - -check-failure~=Branch\/.*$
    actions:
      request_reviews:
        teams:
          - "@contributors"
          - "@approvers"

  - name: "Set no-release and skip-changelog labels for auto updates"
    conditions:
      - and:
          - -merged
          - -closed
      - or:
          - author=dependabot[bot]
          - author=renovate[bot]
          - author=cloudposse-releaser[bot]
      - and:
          - or:
              - files~=test/(go\.mod|go\.sum)$
              - files~=\.tflint\.hcl$
              - files~=(vendor\.ya?ml|component\.ya?ml)$
              - files~=test/.*$
              - files~=\.github/.*$
    actions:
      label:
        add:
          - "no-release"
          - "skip-changelog"

  - name: "label automated pull requests"
    conditions:
      - or:
          - author=dependabot[bot]
          - author=renovate[bot]
          - author=cloudposse-releaser[bot]
      - and:
          - -merged
          - -closed
    actions:
      label:
        add:
          - "auto-update"

  - name: "label automated pull requests that update readme"
    conditions:
      - and:
          - -merged
          - -closed
      - or:
          - author=dependabot[bot]
          - author=renovate[bot]
          - author=cloudposse-releaser[bot]
      - or:
          - files~=README\.md$
          - files~=src/README\.md$
    actions:
      label:
        toggle:
          - "readme"

  - name: "re run actions by removing the label autobots-re-run"
    conditions:
      - and:
          - -merged
          - -closed
      - label~=needs-re-run
    actions:
      label:
        remove:
          - "needs-re-run"

  - name: "ask to resolve conflict"
    conditions:
      - and:
          - -merged
          - -closed
      - conflict
    actions:
      comment:
        message: "💥 This pull request now has conflicts. Could you fix it @{{author}}? 🙏"
      label:
        toggle:
          - conflict

  - name: "ask to not edit the readme"
    conditions:
      - and:
          - -merged
          - -closed
      - not:
          or:
            - author=dependabot[bot]
            - author=renovate[bot]
            - author=cloudposse-releaser[bot]
      - or:
          - files~=README\.md$
          - files~=src/README\.md$
      - -files=README.yaml
    actions:
      comment:
        message: |
          > [!IMPORTANT]
          > Do not edit the `README.md` directly. It's auto-generated from the `README.yaml`
          >
          > Please update the `README.yaml` file instead.
          >

          Could you fix it @{{author}}? 🙏

  - name: "ask for title"
    conditions:
      - or:
          - base=main
          - base=master
      - and:
          - -merged
          - -closed
      - -title~=^[0-9A-Za-z]+
    actions:
      comment:
        message: |
          > [!IMPORTANT]
          > #### Title is necessary and should not be empty.
          >
          > Kindly provide a meaningful title for this Pull Request.

  - name: "ask for description"
    conditions:
      - or:
          - base=main
          - base=master
      - and:
          - -merged
          - -closed
      - -body~=[0-9A-Za-z]{3,}\\s+[0-9A-Za-z]{3,}\\s+[0-9A-Za-z]{3,}
      - body~=(Describe high-level what changed)
    actions:
      comment:
        message: |
          > [!IMPORTANT]
          > #### Description is necessary and should not be empty.
          >
          > Kindly provide details with **what** was changed, **why** it was changed.

  # - name: "remove outdated reviews"
  #   conditions:
  #     - *is_open
  #     - *is_default_branch
  #   actions:
  #     dismiss_reviews:
  #       changes_requested: true
  #       approved: true
  #       message: "This Pull Request was updated, so we're dismissing all reviews."

  - name: "remove triage label if approved"
    conditions:
      - and:
          - -merged
          - -closed
      - '#approved-reviews-by>=1'
    actions:
      label:
        remove:
          - triage

  - name: close automated PRs with persistent merge conflicts quickly
    conditions:
      - and:
          - -merged
          - -closed
      - or:
          - author=dependabot[bot]
          - author=renovate[bot]
          - author=cloudposse-releaser[bot]
      - conflict
      - commits[*].date_committer < 1 days ago
    actions:
      close:
        message: |
          This automated PR was closed due to merge conflicts.

  # - name: close stale PRs with merge conflicts
  #   conditions:
  #     - *is_open
  #     - "conflict"
  #     - commits[*].date_committer < 30 days ago
  #     - updated-at < 7 days ago
  #   actions:
  #     close:
  #       message: |
  #         This PR was closed due to inactivity and merge conflicts. 😭
  #         Please resolve the conflicts and reopen if necessary.

  - name: close stale pull request after 90 days
    conditions:
      - and:
          - -merged
          - -closed
      - or:
          - base=main
          - base=master
      - commits[*].date_committer < 90 days ago
      - updated-at < 3 days ago
      - label~=(stale)
    actions:
      close:
        message: |
          🚪 We're going to close this pull request as it is now stale. Feel free to reopen it if you think it's a mistake.

  - name: label stale pull request after 30 days
    conditions:
      - and:
          - -merged
          - -closed
      - or:
          - base=main
          - base=master
      - commits[*].date_committer < 30 days ago
      - updated-at < 7 days ago
      - -label~=(stale|triage)
    actions:
      label:
        toggle:
          - stale
      comment:
        message: |
          Heads up! This pull request looks stale. It will be closed soon, if there are no new commits. ⏳

  - name: close pull request waiting on feedback for 1 month
    conditions:
      - and:
          - -merged
          - -closed
      - or:
          - base=main
          - base=master
      - label~=(stale)
      - or:
          - label~=(feedback)
          - '#commented-reviews-by > 0'
          - '#changes-requested-reviews-by > 0'
      - updated-at < 30 days ago
    actions:
      close:
        message: |
          📬 We haven't heard back from you, so we're closing this pull request.
          Feel free to reopen it.f you think it's a mistake.

  - name: close pull request marked as invalid, duplicate or won't fix
    conditions:
      - and:
          - -merged
          - -closed
      - or:
          - base=main
          - base=master
      - label~=(duplicate|invalid|wontfix)
    actions:
      close:
        message: |
          ⚰️ This pull request is no longer applicable.
          Feel free to reopen it if you think it's a mistake.

  - name: close pull request that is a work in progress and in active for 1 month
    conditions:
      - and:
          - -merged
          - -closed
      - or:
          - base=main
          - base=master
      - or:
          - title~=^(wip|WIP)
          - label~=(WIP|wip)
          - or:
              - label~=(do-not-merge|do not merge)
              - title~=(do-not-merge|do not merge)
          - label~=(triage|stale|feedback|help needed)
          - draft
      - commits[*].date_committer < 90 days ago
      - updated-at < 30 days ago
    actions:
      close:
        message: |
          This pull request was marked as a work in progress and looks abandoned.
          Feel free to reopen it if you think it's a mistake.

  - name: remove certain labels on close
    conditions:
      - closed
    actions:
      label:
        remove:
          - triage

  - name: "close Pull Requests without files changed"
    conditions:
      - and:
          - -merged
          - -closed
      - '#files=0'
      - not:
          or:
            - author=github-copilot[bot]
            - author=Copilot
            - author~=(?i).*copilot.*
            - body~=(?i)Co-authored-by:.*copilot
    actions:
      label:
        add:
          - "no-changes"
      close:
        message: |
          This pull request was automatically closed as it no longer contains any changes.

          This typically happens when another merged pull request has already included this request's
          proposed modifications into the default branch.

  - name: welcome new contributors
    conditions:
      - and:
          - -merged
          - -closed
      - and:
          - -title~=^(wip|WIP)
          - -label~=(WIP|wip|do-not-merge|do not merge|triage|stale|feedback|help needed)
          - -draft
      - not:
          or:
            - author=dependabot[bot]
            - author=renovate[bot]
            - author=cloudposse-releaser[bot]
      - and:
          - -conflict
          - -label~=(conflict)
      - and:
          - -author=@engineering
          - -author=@contributors
          - -author=@admins
          - -author=@bots
          - -author=@approvers
          - -author=@security
          - not:
              or:
                - author=dependabot[bot]
                - author=renovate[bot]
                - author=cloudposse-releaser[bot]
      - or:
          - base=main
          - base=master
      - updated-at < 5 minutes ago
    actions:
      comment:
        message: |
          Thanks @{{author}} for creating this pull request! 

          A maintainer will review your changes shortly. Please don't be discouraged if it takes a while.

          While you wait, make sure to review our [contributor guidelines](https://github.com/cloudposse/.github/blob/main/CONTRIBUTING.md).

          > [!TIP]
          > #### Need help or want to ask for a PR review to be expedited?
          > Join us on [Slack](https://slack.cloudposse.com) in the `#pr-reviews` channel.

  - name: add triage label for new pull requests
    conditions:
      - and:
          - -merged
          - -closed
      - not:
          or:
            - author=dependabot[bot]
            - author=renovate[bot]
            - author=cloudposse-releaser[bot]
      - '#label=0'
      - '#approved-reviews-by=0'
      - or:
          - created-at > 5 minutes ago
          - commits[*].date_committer > 5 minutes ago
          - updated-at > 7 days ago
    actions:
      label:
        add:
          - triage

  - name: Add needs-test label on new commits
    conditions:
      - and:
          - -merged
          - -closed
      - or:
          - base=main
          - base=master
      - files~=\.tf$
      - commits[*].date_committer > 1 minutes ago
      - -label=~needs-test
    actions:
      label:
        add: ["needs-test"]

  - name: Remove needs-test label when required tests pass
    conditions:
      - and:
          - -merged
          - -closed
      - or:
          - base=main
          - base=master
      - or:
          - -files~=\.tf$
          - and:
              - check-success=test/bats
              - check-success=test/terratest
              - -status-failure~=^(terratest|terraform)$
    actions:
      label:
        remove: ["needs-test"]

  - name: add "WIP" label when the title contains "WIP"
    conditions:
      - and:
          - -merged
          - -closed
      - title~=WIP
    actions:
      label:
        toggle:
          - wip

  - name: add "needs-cloudposse" label when restrictions apply to this PR
    conditions:
      - and:
          - -merged
          - -closed
      - or:
          - files~=(mergify|settings|dependabot|renovate|CODEOWNERS|\.github|Makefile|Dockerfile)
          - label~=(cloudposse)
    actions:
      label:
        toggle:
          - needs-cloudposse
      comment:
        message: |
          > [!IMPORTANT]
          > #### Cloud Posse Engineering Team Review Required
          > This pull request modifies files that require Cloud Posse's review. Please be patient, and a core maintainer will review your changes.
          >
          > To expedite this process, reach out to us on [Slack](https://slack.cloudposse.com) in the `#pr-reviews` channel.

  - name: rebase pull request when it's more than 10 commits behind main
    conditions:
      - and:
          - -merged
          - -closed
      - or:
          - base=main
          - base=master
      - '#commits-behind>=10'
    actions:
      rebase:
        bot_account: cloudpossebot

  - name: rebase pull requests one time when labeled with `rebase`
    conditions:
      - label=rebase
    actions:
      rebase:
        bot_account: cloudpossebot
      label:
        remove:
          - rebase
